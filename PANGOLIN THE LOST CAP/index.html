<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Pangolin Finds the Lost Cap</title>
  <style>
    @font-face {
      font-family: 'pdark';
      src: url('assets/fonts/pdark.ttf');
    }
    @font-face {
      font-family: 'boton-font';
      src: url('assets/fonts/boton-font.ttf');
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
  </style>

  <!--
    TRUCO DE PRECARGA DE FUENTES:
    Renderizar un carácter invisible fuerza al navegador a cargar
    las fuentes antes de que Phaser las use en canvas.
  -->
  <div style="font-family: 'pdark'; position: absolute; opacity: 0;">.</div>
  <div style="font-family: 'boton-font'; position: absolute; opacity: 0;">.</div>
</head>
<body>

  <!--
    BUG FIX #1: El <input> original tenía los atributos fuera del tag de apertura.
    Phaser lo referencia con document.getElementById('inputNombre') para el campo
    de texto del nuevo juego. Se corrige la estructura HTML y se mantiene oculto
    por defecto (display: none); se muestra desde JS cuando se necesita.
  -->
  <input
    id="inputNombre"
    type="text"
    maxlength="12"
    placeholder="Enter username..."
    style="
      display: none;
      position: absolute;
      font-family: 'boton-font';
      font-size: 18px;
      background: #3d1f00;
      color: #FFD700;
      border: 3px solid #FFD700;
      padding: 10px 16px;
      outline: none;
      z-index: 999;
      width: 260px;
      text-align: center;
    "
  />

  <!-- Motor de Phaser 3 -->
  <script src="./JS/phaser.min.js"></script>

  <script>

    // ═══════════════════════════════════════════════════════
    //  ESCENA 1 · SPLASH — Logo de Kernel Games
    // ═══════════════════════════════════════════════════════
    class SplashScene extends Phaser.Scene {

      constructor() {
        super({ key: 'SplashScene' })
      }

      preload() {
        // Carga el logo del estudio
        this.load.image('logo-kernel', 'assets/sprites/logo-kernel.png')
      }

      create() {
        this.cameras.main.setBackgroundColor('#000000')

        // Logo centrado con fade-in
        const logo = this.add.image(
          this.scale.width  / 2,
          this.scale.height / 2,
          'logo-kernel'
        )
        .setDisplaySize(600, 300)
        .setAlpha(0)

        // Animación: fade-in → espera 2 s → fade-out → MenuScene
        this.tweens.add({
          targets:  logo,
          alpha:    1,
          duration: 1500,
          ease:     'Power2',
          onComplete: () => {
            this.time.delayedCall(2000, () => {
              this.tweens.add({
                targets:  logo,
                alpha:    0,
                duration: 1000,
                ease:     'Power2',
                onComplete: () => this.scene.start('MenuScene')
              })
            })
          }
        })
      }
    }


    // ═══════════════════════════════════════════════════════
    //  ESCENA 2 · MENÚ PRINCIPAL
    // ═══════════════════════════════════════════════════════
    class MenuScene extends Phaser.Scene {

      constructor() {
        super({ key: 'MenuScene' })
      }

      // ─── CARGA DE ASSETS ──────────────────────────────────
      preload() {
        this.load.image('fondo',      'assets/sprites/fondo-menu.png')
        this.load.audio('musica',     'assets/audio/menu-music.mp3')
        this.load.image('boton',      'assets/sprites/boton.png')
        this.load.image('boton-info', 'assets/sprites/boton-info.png')
        this.load.image('panel',      'assets/sprites/panel.png')
      }

      // ─── CONSTRUCCIÓN DE LA ESCENA ────────────────────────
      create() {
        // Fondo a pantalla completa
        this.add.image(0, 0, 'fondo')
          .setOrigin(0, 0)
          .setDisplaySize(this.scale.width, this.scale.height)

        // Música de fondo en bucle
        this.sound.play('musica', { loop: true })

        // ── Título: "PANGOLIN :" ──────────────────────────
        // Sombra (ligeramente desplazada, color oscuro)
        this.add.text(
          this.scale.width * 0.22 + 5,
          this.scale.height * 0.12 + 5,
          'PANGOLIN :',
          { fontFamily: '"pdark"', fontSize: '64px', color: '#8B6000',
            stroke: '#000000', strokeThickness: 6 }
        ).setOrigin(0.5)

        // Texto principal encima de la sombra
        this.add.text(
          this.scale.width * 0.22,
          this.scale.height * 0.12,
          'PANGOLIN :',
          { fontFamily: '"pdark"', fontSize: '64px', color: '#8B6000',
            stroke: '#4a4a4a', strokeThickness: 5,
            shadow: { offsetX: 3, offsetY: 3, color: '#000000', blur: 0, fill: true } }
        ).setOrigin(0.5)

        // ── Título: "THE LOST CAP" ────────────────────────
        // Sombra
        this.add.text(
          this.scale.width * 0.22 + 5,
          this.scale.height * 0.22 + 5,
          'THE LOST CAP',
          { fontFamily: '"pdark"', fontSize: '64px', color: '#4a4a4a',
            stroke: '#000000', strokeThickness: 6 }
        ).setOrigin(0.5)

        // Texto principal
        this.add.text(
          this.scale.width * 0.22,
          this.scale.height * 0.22,
          'THE LOST CAP',
          { fontFamily: '"pdark"', fontSize: '64px', color: '#C0C0C0',
            stroke: '#4a4a4a', strokeThickness: 5,
            shadow: { offsetX: 3, offsetY: 3, color: '#000000', blur: 0, fill: true } }
        ).setOrigin(0.5)

        // ── Botón de información (esquina superior derecha) ──
        const btnInfo = this.add.image(this.scale.width - 75, 100, 'boton-info')
          .setDisplaySize(60, 80)
          .setInteractive()

        btnInfo.on('pointerover', () => btnInfo.setTint(0xffdd00))
        btnInfo.on('pointerout',  () => btnInfo.clearTint())
        btnInfo.on('pointerdown', () => this.mostrarInfo())

        // ── Botones del menú principal ────────────────────
        this.crearBoton(
          this.scale.width * 0.15, this.scale.height * 0.42,
          'PLAY',     () => this.mostrarPartidas()
        )

        this.crearBoton(
          this.scale.width * 0.15, this.scale.height * 0.54,
          'NEW GAME', () => this.mostrarNuevoJuego()
        )

        this.crearBoton(
          this.scale.width * 0.15, this.scale.height * 0.66,
          'SETTINGS', () => this.mostrarSettings()
        )

        this.crearBoton(
          this.scale.width * 0.15, this.scale.height * 0.78,
          'EXIT GAME', () => this.mostrarConfirmacionSalida()
          /*
            BUG FIX #2: El bloque original llamaba a mostrarConfirmacionSalida()
            y luego ejecutaba código adicional inline que intentaba llamar
            .fillStyle() y .fillRect() sobre el resultado de this.add.image(),
            que es un objeto Image (no Graphics) → TypeError en runtime.
            Se elimina el bloque duplicado; mostrarConfirmacionSalida() ya
            construye correctamente el diálogo con su propio panel + botones.
          */
        )
      }


      // ─── DIÁLOGO: CONFIRMAR SALIDA ────────────────────────
      mostrarConfirmacionSalida() {
        // Panel de fondo usando el sprite 'panel'
        this.add.image(
          this.scale.width  / 2,
          this.scale.height / 2,
          'panel'
        ).setDisplaySize(500, 220).setDepth(0)

        // Pregunta centrada
        this.add.text(
          this.scale.width  / 2,
          this.scale.height / 2 - 50,
          'Are you sure you want to exit?',
          { fontFamily: '"boton-font"', fontSize: '18px', color: '#ffffff' }
        ).setOrigin(0.5).setDepth(1)

        // Botón YES → cierra la ventana
        this.crearBoton(
          this.scale.width / 2 - 120,
          this.scale.height / 2 + 50,
          'YES',
          () => window.close(),
          160
        )

        // Botón CANCEL → recarga la escena del menú
        this.crearBoton(
          this.scale.width / 2 + 120,
          this.scale.height / 2 + 50,
          'CANCEL',
          () => this.scene.restart(),
          160
        )
      }


      // ─── DIÁLOGO: INFORMACIÓN / CRÉDITOS ─────────────────
      mostrarInfo() {
        this.add.image(
          this.scale.width  / 2,
          this.scale.height / 2,
          'panel'
        ).setDisplaySize(700, 420).setDepth(0)

        // Título del juego dentro del panel
        this.add.text(
          this.scale.width / 2,
          this.scale.height / 2 - 140,
          'PANGOLIN : THE LOST CAP',
          { fontFamily: '"pdark"', fontSize: '20px', color: '#FFD700',
            stroke: '#8B6000', strokeThickness: 4 }
        ).setOrigin(0.5).setDepth(1)

        // Textos informativos
        const lineas = [
          { y: -100, txt: 'This game is developed by Kernel Games.',  size: '13px', col: '#ffffff' },
          { y:  -60, txt: 'Version: v1.0 BETA',                       size: '13px', col: '#FFD700' },
          { y:  -20, txt: '© 2026 Kernel Games. All rights reserved.', size: '11px', col: '#ffffff' },
          { y:   20, txt: 'Kernel Games and its logo are trademarks of Kernel Games.', size: '11px', col: '#ffffff' },
        ]
        lineas.forEach(l => {
          this.add.text(
            this.scale.width / 2,
            this.scale.height / 2 + l.y,
            l.txt,
            { fontFamily: '"boton-font"', fontSize: l.size, color: l.col }
          ).setOrigin(0.5).setDepth(1)
        })

        // Aviso de copyright multilinea
        this.add.text(
          this.scale.width / 2,
          this.scale.height / 2 + 55,
          'This game and its content may not be copied,\ndistributed, or modified without permission.',
          { fontFamily: '"boton-font"', fontSize: '11px', color: '#ffffff', align: 'center' }
        ).setOrigin(0.5).setDepth(1)

        // Mensaje de agradecimiento
        this.add.text(
          this.scale.width / 2,
          this.scale.height / 2 + 110,
          'Thank you for playing!   Enjoy it ;)',
          { fontFamily: '"boton-font"', fontSize: '13px', color: '#FFD700' }
        ).setOrigin(0.5).setDepth(1)

        // Cierra el panel y recarga el menú
        this.crearBoton(
          this.scale.width / 2,
          this.scale.height / 2 + 180,
          'CLOSE',
          () => this.scene.restart(),
          160
        )
      }


      // ─── DIÁLOGO: AJUSTES DE AUDIO ────────────────────────
      mostrarSettings() {
        // Valores iniciales de volumen (0–1)
        let volumenSound = 0.5
        let volumenSFX   = 0.5

        // Panel de fondo
        this.add.image(
          this.scale.width  / 2,
          this.scale.height / 2,
          'panel'
        ).setDisplaySize(600, 300).setDepth(0)

        // Título
        this.add.text(
          this.scale.width / 2,
          this.scale.height / 2 - 90,
          'SETTINGS',
          { fontFamily: '"boton-font"', fontSize: '24px',
            color: '#FFD700', stroke: '#8B6000', strokeThickness: 4 }
        ).setOrigin(0.5).setDepth(1)

        // ── Barra de volumen SOUND ──
        this.add.text(
          this.scale.width / 2 - 200,
          this.scale.height / 2 - 40,
          'SOUND',
          { fontFamily: '"boton-font"', fontSize: '16px', color: '#ffffff' }
        ).setOrigin(0, 0.5).setDepth(1)

        // Fondo de la barra (oscuro)
        const fondoSound = this.add.graphics().setDepth(1)
        fondoSound.fillStyle(0x8B6000, 1)
        fondoSound.fillRect(this.scale.width / 2 - 50, this.scale.height / 2 - 52, 200, 20)

        // Relleno de la barra (dorado, proporcional al volumen)
        const rellenoSound = this.add.graphics().setDepth(2)
        const dibujarSound = () => {
          rellenoSound.clear()
          rellenoSound.fillStyle(0xFFD700, 1)
          rellenoSound.fillRect(
            this.scale.width / 2 - 50,
            this.scale.height / 2 - 52,
            200 * volumenSound, 20
          )
        }
        dibujarSound()

        // Zona interactiva invisible sobre la barra para detectar clics
        const zonaSound = this.add.zone(
          this.scale.width / 2 - 50,
          this.scale.height / 2 - 52,
          200, 20
        ).setOrigin(0, 0).setInteractive().setDepth(3)

        zonaSound.on('pointerdown', (pointer) => {
          // Calcula el volumen según la posición X del clic
          const relativo = pointer.x - (this.scale.width / 2 - 50)
          volumenSound   = Phaser.Math.Clamp(relativo / 200, 0, 1)
          this.sound.setVolume(volumenSound)
          dibujarSound()
        })

        // ── Barra de volumen SFX ──
        this.add.text(
          this.scale.width / 2 - 200,
          this.scale.height / 2 + 30,
          'SFX',
          { fontFamily: '"boton-font"', fontSize: '16px', color: '#ffffff' }
        ).setOrigin(0, 0.5).setDepth(1)

        const fondoSFX = this.add.graphics().setDepth(1)
        fondoSFX.fillStyle(0x8B6000, 1)
        fondoSFX.fillRect(this.scale.width / 2 - 50, this.scale.height / 2 + 18, 200, 20)

        const rellenoSFX = this.add.graphics().setDepth(2)
        const dibujarSFX = () => {
          rellenoSFX.clear()
          rellenoSFX.fillStyle(0xFFD700, 1)
          rellenoSFX.fillRect(
            this.scale.width / 2 - 50,
            this.scale.height / 2 + 18,
            200 * volumenSFX, 20
          )
        }
        dibujarSFX()

        const zonaSFX = this.add.zone(
          this.scale.width / 2 - 50,
          this.scale.height / 2 + 18,
          200, 20
        ).setOrigin(0, 0).setInteractive().setDepth(3)

        zonaSFX.on('pointerdown', (pointer) => {
          const relativo = pointer.x - (this.scale.width / 2 - 50)
          volumenSFX     = Phaser.Math.Clamp(relativo / 200, 0, 1)
          // NOTA: cuando se integre el gestor de SFX, aplicar volumenSFX aquí
          dibujarSFX()
        })

        // Botón para cerrar el panel
        this.crearBoton(
          this.scale.width / 2,
          this.scale.height / 2 + 80,
          'CLOSE',
          () => this.scene.restart(),
          160
        )
      }


      // ─── DIÁLOGO: NUEVO JUEGO ────────────────────────────
      mostrarNuevoJuego() {
        // Panel de fondo
        this.add.image(
          this.scale.width  / 2,
          this.scale.height / 2,
          'panel'
        ).setDisplaySize(400, 320).setDepth(0)

        // BUG FIX #3: El título tenía Y = height/2 - 400, quedaba fuera de pantalla.
        // Se ajusta a height/2 - 120 para que quede dentro del panel.
        this.add.text(
          this.scale.width / 2,
          this.scale.height / 2 - 120,
          'NEW GAME',
          { fontFamily: '"pdark"', fontSize: '24px', color: '#FFD700',
            stroke: '#8B6000', strokeThickness: 4 }
        ).setOrigin(0.5).setDepth(1)

        // Etiqueta del campo de texto
        this.add.text(
          this.scale.width / 2,
          this.scale.height / 2 - 40,
          'Enter your username:',
          { fontFamily: '"boton-font"', fontSize: '16px', color: '#ffffff' }
        ).setOrigin(0.5).setDepth(1)

        // Muestra y posiciona el <input> HTML sobre el canvas
        const input = document.getElementById('inputNombre')
        input.style.display = 'block'
        input.style.left    = (this.scale.width  / 2 - 130) + 'px'
        input.style.top     = (this.scale.height / 2 - 10)  + 'px'
        input.value         = ''
        input.focus()

        // Botón CONFIRM → valida el nombre y guarda la partida
        this.crearBoton(
          this.scale.width / 2 - 100,
          this.scale.height / 2 + 120,
          'CONFIRM',
          () => {
            const nombre = input.value.trim()

            // Validación: el nombre no puede estar vacío
            if (nombre === '') return

            const partidas = JSON.parse(localStorage.getItem('partidas') || '[]')

            // Límite máximo de 10 slots de guardado
            if (partidas.length >= 10) {
              alert('No hay slots disponibles')
              return
            }

            // Crea el objeto de la nueva partida y lo guarda en localStorage
            partidas.push({
              slot:   partidas.length + 1,
              nombre: nombre,
              nivel:  1,
              fecha:  new Date().toLocaleDateString('es-CO'),
              hora:   new Date().toLocaleTimeString('es-CO')
            })
            localStorage.setItem('partidas', JSON.stringify(partidas))

            input.style.display = 'none'
            this.sound.stopAll()
            this.scene.start('GameScene')
          },
          100
        )

        // Botón CANCEL → oculta el input y recarga el menú
        this.crearBoton(
          this.scale.width / 2 + 100,
          this.scale.height / 2 + 120,
          'CANCEL',
          () => {
            input.style.display = 'none'
            this.scene.restart()
          },
          100
        )
      }


      // ─── DIÁLOGO: SELECCIONAR PARTIDA GUARDADA ───────────
      mostrarPartidas() {
        /*
          BUG FIX #4: El original hacía:
            this.add.image( this.add.image(...) )
          Es decir, pasaba el objeto Image devuelto como primer argumento
          de una segunda llamada a add.image(), lo que es inválido.
          Se corrige usando una sola llamada limpia.
        */
        this.add.image(
          this.scale.width  / 2,
          this.scale.height / 2,
          'panel'
        ).setDisplaySize(700, 580).setDepth(0)

        // Título del panel
        this.add.text(
          this.scale.width / 2,
          this.scale.height / 2 - 250,
          'SELECT SAVE',
          { fontFamily: '"boton-font"', fontSize: '24px',
            color: '#FFD700', stroke: '#8B6000', strokeThickness: 4 }
        ).setOrigin(0.5).setDepth(1)

        // Lee las partidas guardadas
        const partidas = JSON.parse(localStorage.getItem('partidas') || '[]')

        // Dibuja los 10 slots (ocupados o vacíos)
        for (let i = 0; i < 10; i++) {
          const partida = partidas.find(p => p.slot === i + 1)
          const slotY   = this.scale.height / 2 - 200 + i * 45
          const slotX   = this.scale.width  / 2

          if (partida) {
            // Slot con datos → al hacer clic arranca la partida
            this.crearBoton(
              slotX, slotY,
              `${partida.nombre}   Nv.${partida.nivel}   ${partida.fecha}`,
              () => {
                this.sound.stopAll()
                this.scene.start('GameScene')
              },
              340
            )
          } else {
            // Slot vacío → botón deshabilitado (sin acción)
            this.crearBoton(slotX, slotY, `SLOT ${i + 1}  —  EMPTY`, () => {}, 340)
          }
        }

        // Botón de regreso al menú principal
        this.crearBoton(
          this.scale.width / 2,
          this.scale.height / 2 + 260,
          'BACK',
          () => this.scene.restart(),
          160
        )
      }


      // ─── UTILIDAD: CREAR BOTÓN REUTILIZABLE ──────────────
      /**
       * Crea un botón compuesto: sprite de fondo + etiqueta interactiva.
       * @param {number} x        Posición X centro
       * @param {number} y        Posición Y centro
       * @param {string} texto    Texto del botón
       * @param {Function} accion Callback al hacer clic
       * @param {number} ancho    Ancho del sprite (por defecto 300)
       * @param {string} tamano   Tamaño de fuente (por defecto '13px')
       */
      crearBoton(x, y, texto, accion, ancho = 300, tamano = '13px') {
        // Sprite de fondo del botón
        const boton = this.add.image(x, y, 'boton')
          .setDisplaySize(ancho, 50)
          .setDepth(1)

        // Etiqueta del botón (es la que recibe los eventos)
        const label = this.add.text(x, y, texto, {
          fontFamily: '"boton-font"',
          fontSize:   tamano,
          color:      '#ffffff',
          stroke:     '#000000',
          strokeThickness: 3,
        })
        .setOrigin(0.5).setDepth(2)
        .setInteractive(
          new Phaser.Geom.Rectangle(-150, -30, 300, 60),
          Phaser.Geom.Rectangle.Contains
        )

        // Efecto hover: tinta amarilla sobre el sprite y cambio de color del texto
        label.on('pointerover', () => {
          boton.setTint(0xffdd00)
          label.setColor('#ffdd00')
        })
        label.on('pointerout', () => {
          boton.clearTint()
          label.setColor('#ffffff')
        })

        // Clic ejecuta la acción pasada como parámetro
        label.on('pointerdown', accion)
      }
    }


    // ═══════════════════════════════════════════════════════
    //  ESCENA 3 · JUEGO — Lógica principal
    // ═══════════════════════════════════════════════════════
    class GameScene extends Phaser.Scene {

      constructor() {
        super({ key: 'GameScene' })
      }

      preload() {
        // Aquí se cargarán los sprites, tilemaps y sonidos del nivel
      }

      create() {
        /*
          BUG FIX #5: El original tenía `fontFamily: '"pdark"'` como sentencia
          suelta al inicio de create(). En JavaScript se interpreta como un
          label de bloque (sintaxis válida pero sin efecto), no como configuración.
          Se elimina; la fuente se aplica directamente en cada objeto de texto.
        */

        // ── Suelo estático invisible a lo largo del borde inferior ──
        this.suelo = this.physics.add.staticGroup()
        this.suelo.create(window.innerWidth / 2, window.innerHeight - 10, null)
          .setDisplaySize(window.innerWidth, 20)
          .setVisible(false)
          .refreshBody()

        // ── Personaje provisional (textura generada en memoria) ──
        // Se crea un rectángulo azul 40×50 como placeholder del sprite del pangolín
        const graphics = this.add.graphics()
        graphics.fillStyle(0x00aaff, 1)
        graphics.fillRect(0, 0, 40, 50)
        graphics.generateTexture('pangolin', 40, 50)
        graphics.destroy() // La textura ya está en caché; el Graphics ya no se necesita

        // Sprite del pangolín con física arcade
        this.pangolin = this.physics.add.sprite(150, window.innerHeight - 200, 'pangolin')
        this.pangolin.setBounce(0.1)
        this.pangolin.setCollideWorldBounds(true)

        // Colisión física entre el pangolín y el suelo
        this.physics.add.collider(this.pangolin, this.suelo)

        // Mapa de teclas de cursor (flechas + shift + espacio)
        this.cursors = this.input.keyboard.createCursorKeys()
      }

      update() {
        // ── Movimiento horizontal ──
        if (this.cursors.left.isDown) {
          this.pangolin.setVelocityX(-200)       // Desplazarse a la izquierda
        } else if (this.cursors.right.isDown) {
          this.pangolin.setVelocityX(200)        // Desplazarse a la derecha
        } else {
          this.pangolin.setVelocityX(0)          // Detenerse al soltar la tecla
        }

        // ── Salto (solo si toca el suelo) ──
        if (this.cursors.up.isDown && this.pangolin.body.touching.down) {
          this.pangolin.setVelocityY(-550)
        }
      }
    }


    // ═══════════════════════════════════════════════════════
    //  CONFIGURACIÓN DE PHASER
    // ═══════════════════════════════════════════════════════
    const config = {
      type:            Phaser.AUTO,
      width:           window.innerWidth,   // Ocupa todo el ancho de la ventana
      height:          window.innerHeight,  // Ocupa todo el alto de la ventana
      backgroundColor: '#1a1a2e',
      physics: {
        default: 'arcade',
        arcade: {
          gravity: { y: 600 }, // Gravedad global hacia abajo
          debug:   false        // Cambiar a true para ver hitboxes
        }
      },
      scale: {
        mode:       Phaser.Scale.RESIZE,          // Se adapta al redimensionar ventana
        autoCenter: Phaser.Scale.CENTER_BOTH      // Centra el canvas
      },
      // Orden de escenas: splash → menú → juego
      scene: [SplashScene, MenuScene, GameScene]
    }

    // Instancia principal del juego
    const game = new Phaser.Game(config)

  </script>
