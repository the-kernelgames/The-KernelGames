    class SplashScene extends Phaser.Scene {

  constructor() {
    super({ key: 'SplashScene' })
  }

  preload() {
    this.load.image('logo-kernel', 'assets/sprites/logo-kernel.png')
  }

  create() {
    // Fondo negro
    this.cameras.main.setBackgroundColor('#000000')

    // Logo centrado
    const logo = this.add.image(
      this.scale.width / 2,
      this.scale.height / 2,
      'logo-kernel'
    )
    .setDisplaySize(600, 300)
    .setAlpha(0)

    // Fade in del logo
    this.tweens.add({
      targets:  logo,
      alpha:    1,
      duration: 1500,
      ease:     'Power2',
      onComplete: () => {
        // Espera 2 segundos y pasa al menú
        this.time.delayedCall(2000, () => {
          this.tweens.add({
            targets:  logo,
            alpha:    0,
            duration: 1000,
            ease:     'Power2',
            onComplete: () => {
              this.scene.start('MenuScene')
            }
          })
        })
      }
    })
  }
}

  mostrarSettings() {
   let volumenSound = 0.5
  let volumenSFX   = 0.5

  this.add.image(
    this.scale.width / 2,
    this.scale.height / 2,
    'panel'
  ).setDisplaySize(600, 300).setDepth(0)

  this.add.text(
    this.scale.width / 2,
    this.scale.height / 2 - 90,
    'SETTINGS',
    {
      fontFamily: '"boton-font"',
      fontSize: '24px',
      color: '#FFD700',
      stroke: '#8B6000',
      strokeThickness: 4
    }
  ).setOrigin(0.5).setDepth(1)

  // ── SOUND ──

    this.scale.width / 2 - 200,
    this.scale.height / 2 - 40,

  ).setOrigin(0, 0.5).setDepth(1)

  const fondoSound = this.add.graphics().setDepth(1)

  fondoSound.fillRect(this.scale.width / 2 - 50, this.scale.height / 2 - 52, 200, 20)

  const rellenoSound = this.add.graphics().setDepth(2)

    rellenoSound.clear()
    rellenoSound.fillStyle(0xFFD700, 1)
    rellenoSound.fillRect(
      this.scale.width / 2 - 50,
      this.scale.height / 2 - 52,
      200 * volumenSound, 20
    )
  }
  dibujarSound()

  const zonaSound = this.add.zone(
    this.scale.width / 2 - 50,
    this.scale.height / 2 - 52,
    200, 20
  ).setOrigin(0, 0).setInteractive().setDepth(3)

  zonaSound.on('pointerdown', (pointer) => {
    const relativo = pointer.x - (this.scale.width / 2 - 50)
    volumenSound   = Phaser.Math.Clamp(relativo / 200, 0, 1)
    this.sound.setVolume(volumenSound)
    dibujarSound()

  // Función que crea cada botón
  crearBoton(x, y, texto, accion, ancho = 300, tamano = '13px') {
    // Sprite del botón pixel art
  const boton = this.add.image(x, y, 'boton')
  .setDisplaySize(ancho, 50)
  .setDepth(1)

  // Texto encima del botón
  const label = this.add.text(x, y, texto, {
    fontFamily: '"boton-font"',
    fontSize: tamano,
    color: '#ffffff',
    stroke: '#000000',
    strokeThickness: 3,
  })
  .setOrigin(0.5).setDepth(2)
  .setInteractive(
    new Phaser.Geom.Rectangle(-150, -30, 300, 60),
    Phaser.Geom.Rectangle.Contains
  )

  // Efecto hover
  label.on('pointerover', () => {
    boton.setTint(0xffdd00)
    label.setColor('#ffdd00')
    
  })

  label.on('pointerout', () => {
    boton.clearTint()
    label.setColor('#ffffff')
   
  })

  // Clic
  label.on('pointerdown', accion)
  } mostrarNuevoJuego() {
  this.add.image(
    this.scale.width / 2,
    this.scale.height / 2,
    'panel'
  ).setDisplaySize(650, 400).setDepth(0) //aqui cambie el tamaño del panel de new game, ya que estaba muy pequeño

  this.add.text(
    this.scale.width / 2,
    this.scale.height / 2 - 400,
    'NEW GAME',
    { fontFamily: '"pdark"', fontSize: '24px', color: '#FFD700', stroke: '#8B6000', strokeThickness: 4 }
  ).setOrigin(0.5).setDepth(10)

  this.add.text(
    this.scale.width / 2,
    this.scale.height / 2 - 40,
    'Enter your username:',
    { fontFamily: '"boton-font"', fontSize: '16px', color: '#ffffff' }
  ).setOrigin(0.5).setDepth(11)

  const input = document.getElementById('inputNombre')
  input.style.display = 'block'
  input.style.left    = (this.scale.width / 2 - 130) + 'px'
  input.style.top     = (this.scale.height / 2 - 10) + 'px'
  input.value         = ''
  input.focus()

  this.crearBoton(
    this.scale.width / 2 - 100,
    this.scale.height / 2 + 120,
    'CONFIRM',
    () => {
      const nombre = input.value.trim()
      if (nombre === '') return

      const partidas = JSON.parse(localStorage.getItem('partidas') || '[]')

      if (partidas.length >= 10) {
        alert('No hay slots disponibles')
        return
      }

      partidas.push({
        slot:   partidas.length + 1,
        nombre: nombre,
        nivel:  1,
        fecha:  new Date().toLocaleDateString('es-CO'),
        hora:   new Date().toLocaleTimeString('es-CO')
      })

      localStorage.setItem('partidas', JSON.stringify(partidas))
      input.style.display = 'none'
      this.sound.stopAll()
      this.scene.start('GameScene')
    },
    100
  )

  this.crearBoton(
    this.scale.width / 2 + 100,
    this.scale.height / 2 + 120,
    'CANCEL',
    () => {
      input.style.display = 'none'
      this.scene.restart()
    },
    100
  )
}
mostrarPartidas() {
  const overlay = this.add.image(this.add.image(
  this.scale.width / 2,
  this.scale.height / 2,
  'panel'
).setDisplaySize(700, 580).setDepth(0))
  

  this.add.text(
    this.scale.width / 2,
    this.scale.height / 2 - 250,
    'SELECT SAVE',
    { fontFamily: '"boton-font"', fontSize: '24px', color: '#FFD700', stroke: '#8B6000', strokeThickness: 4 }
  ).setOrigin(0.5).setDepth(1)

  const partidas = JSON.parse(localStorage.getItem('partidas') || '[]')

  for (let i = 0; i < 10; i++) {
    const partida = partidas.find(p => p.slot === i + 1)
    const slotY   = this.scale.height / 2 - 200 + i * 45
    const slotX   = this.scale.width / 2

    if (partida) {
      this.crearBoton(
        slotX, slotY,
        `${partida.nombre}   Nv.${partida.nivel}   ${partida.fecha}`,
        () => {
          this.sound.stopAll()
          this.scene.start('GameScene')
        },
        340
      )
    } else {
      this.crearBoton(slotX, slotY, `SLOT ${i + 1}  —  EMPTY`, () => {}, 340)
    }
  }

  this.crearBoton(
    this.scale.width / 2,
    this.scale.height / 2 + 260,
    'BACK',
    () => this.scene.restart(),
    160
  )
}

} 

    // ─── ESCENA PRINCIPAL ───────────────────────────────────
    
    class GameScene extends Phaser.Scene {

      constructor() {
        super({ key: 'GameScene' })
      }

      preload() {
        // Aquí cargaremos los sprites y tilemaps más adelante
      }

      create() {
        fontFamily: '"pdark"'
  // Suelo provisional
 this.suelo = this.physics.add.staticGroup()
this.suelo.create(window.innerWidth / 2, window.innerHeight - 10, null)
  .setDisplaySize(window.innerWidth, 20)
  .setVisible(false)
  .refreshBody()
  // Pangolín provisional (rectángulo azul)
// Crea una textura de color sólido en memoria
const graphics = this.add.graphics()
graphics.fillStyle(0x00aaff, 1)       // color azul
graphics.fillRect(0, 0, 40, 50)       // ancho 40, alto 50
graphics.generateTexture('pangolin', 40, 50)
graphics.destroy()

// Ahora sí crea el personaje con esa textura
this.pangolin = this.physics.add.sprite(150, window.innerHeight - 200, 'pangolin')
this.pangolin.setBounce(0.1)
this.pangolin.setCollideWorldBounds(true)
  // Colisión entre pangolín y suelo
  this.physics.add.collider(this.pangolin, this.suelo)

  // Teclas
  this.cursors = this.input.keyboard.createCursorKeys()
}
      update() {
        // Aquí va la lógica del juego frame a frame
          // Moverse a la izquierda
  if (this.cursors.left.isDown) {
    this.pangolin.setVelocityX(-200)
  }
  // Moverse a la derecha
  else if (this.cursors.right.isDown) {
    this.pangolin.setVelocityX(200)
  }
  // Sin tecla = se detiene
  else {
    this.pangolin.setVelocityX(0)
  }

  // Saltar solo si está tocando el suelo
  if (this.cursors.up.isDown && this.pangolin.body.touching.down) {
    this.pangolin.setVelocityY(-550)
  }
      }
    }

    // ─── CONFIGURACIÓN DE PHASER ────────────────────────────
    const config = {
   type: Phaser.AUTO,
  width: window.innerWidth,        // toma el ancho real de la pantalla
  height: window.innerHeight,      // toma el alto real de la pantalla
  backgroundColor: '#1a1a2e',
  physics: {
    default: 'arcade',
    arcade: {
      gravity: { y: 600 },
      debug: false
    }
  },
  scale: {
    mode: Phaser.Scale.RESIZE,     // se adapta si cambia el tamaño
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: [SplashScene,MenuScene, GameScene]
    }

    const game = new Phaser.Game(config)
